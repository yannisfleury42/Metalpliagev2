<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Hybrides Chrome × Laser — Métal Pliage</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height:100%;
    background: radial-gradient(ellipse at center, #1a1a1a 0%, #050505 100%);
    color:#eee;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    overflow:hidden;
  }
  @media (pointer: fine) { * { cursor: none !important; } }

  .topbar {
    position:fixed; top:0; left:0; right:0;
    padding:18px 20px;
    display:flex; gap:10px; flex-wrap:wrap;
    align-items:center;
    z-index:1000;
    background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%);
  }
  .topbar h1 {
    font-size:13px; font-weight:600; letter-spacing:2px;
    text-transform:uppercase; color:#FF6F00;
    margin-right:16px;
  }
  .style-btn {
    padding:9px 16px;
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,111,0,0.3);
    color:#eee;
    border-radius:6px;
    font-size:12px;
    font-weight:500;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
  }
  .style-btn:hover {
    background: rgba(255,111,0,0.15);
    border-color: rgba(255,111,0,0.6);
  }
  .style-btn.active {
    background: linear-gradient(135deg, #FF6F00, #FF4500);
    border-color: #FF6F00;
    color:#fff;
    box-shadow: 0 4px 20px rgba(255,111,0,0.4);
  }

  .playground {
    height:100%;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:36px;
    padding:80px 40px 40px;
  }
  .playground h2 {
    font-size:42px; font-weight:300; letter-spacing:3px;
    text-align:center; color:#fff;
    text-shadow: 0 0 40px rgba(255,111,0,0.3);
  }
  .label {
    font-size:12px; letter-spacing:4px;
    color:rgba(255,255,255,0.4);
    text-transform:uppercase;
  }
  .test-zone {
    display:flex; gap:20px; flex-wrap:wrap; justify-content:center;
  }
  .test-card {
    width:200px; height:140px;
    background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border:1px solid rgba(255,255,255,0.1);
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:14px;
    transition: all 0.3s;
  }
  .test-card:hover {
    border-color: rgba(255,111,0,0.5);
    transform: translateY(-4px);
    box-shadow: 0 10px 40px rgba(255,111,0,0.15);
  }

  .shard {
    position:fixed;
    pointer-events:none;
    z-index:99998;
    will-change: transform, opacity, left, top;
  }
  .core {
    position:fixed;
    pointer-events:none;
    z-index:99999;
    border-radius:50%;
  }

  .style-info {
    position:fixed;
    bottom:20px; left:50%;
    transform: translateX(-50%);
    padding: 12px 24px;
    background: rgba(0,0,0,0.75);
    border:1px solid rgba(255,111,0,0.3);
    border-radius:30px;
    font-size:13px;
    backdrop-filter: blur(10px);
    text-align:center;
    max-width: 750px;
  }
  .style-info strong { color:#FF6F00; }
  .style-info em { color: rgba(255,255,255,0.6); font-style:normal; font-size:11px; display:block; margin-top:4px; }
</style>
</head>
<body>
  <div class="topbar">
    <h1>◆ Hybrides Chrome × Laser</h1>
    <button class="style-btn active" data-style="1">1 · Chrome directionnel</button>
    <button class="style-btn" data-style="2">2 · Filaments argent</button>
    <button class="style-btn" data-style="3">3 · Filaments dorés</button>
    <button class="style-btn" data-style="4">4 · Brand orange</button>
  </div>

  <div class="playground">
    <span class="label">— BOUGE LA SOURIS POUR VOIR L'ALIGNEMENT DIRECTIONNEL —</span>
    <h2>Métal Pliage</h2>
    <div class="test-zone">
      <div class="test-card">Survole-moi</div>
      <div class="test-card">Élément interactif</div>
      <div class="test-card">Test hover</div>
    </div>
  </div>

  <div class="style-info" id="style-info"></div>

<script>
(function(){
  const infos = {
    1: '<strong>Chrome directionnel</strong> — formes mixtes chrome (lignes + losanges + points) qui <u>s\'orientent dans le sens du mouvement</u>. Mix entre la richesse formelle du #1 et l\'alignement du #3.<em>Le plus riche visuellement, parfait équilibre</em>',
    2: '<strong>Filaments argent</strong> — traits ultra-fins blanc-argent froid, alignés au mouvement, dispersion perpendiculaire. Le #3 en couleurs chrome (pas cyan).<em>Pur, minimal, métallique</em>',
    3: '<strong>Filaments dorés premium</strong> — traits fins champagne/dorés, alignés au mouvement, glow chaud subtil. Look luxe / haute joaillerie.<em>Premium, raffiné, sortant de la charte mais très élégant</em>',
    4: '<strong>Filaments brand orange</strong> — traits fins orange/dorés (charte du site), alignés au mouvement. Le #3 dans la charte de Métal Pliage.<em>Le plus cohérent avec l\'identité visuelle existante</em>'
  };

  let currentStyle = 1;
  let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;
  let prevMouseX = mouseX, prevMouseY = mouseY;
  let mouseSpeed = 0;
  let perpAngle = 0;
  let trailAngle = 0;

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  const containers = {};
  for (let i = 1; i <= 4; i++) {
    const c = document.createElement('div');
    c.id = 'style-' + i;
    c.style.display = 'none';
    document.body.append(c);
    containers[i] = c;
  }

  // ═══ STYLE 1 : CHROME DIRECTIONNEL (mix de formes alignées) ═══
  const s1Core = document.createElement('div');
  s1Core.className = 'core';
  s1Core.style.cssText = 'width:8px;height:8px;background:linear-gradient(135deg,#fff,#aab,#456);box-shadow:0 0 12px rgba(200,220,255,0.6), 0 0 24px rgba(150,180,220,0.3);transform:translate(-50%,-50%);';
  containers[1].append(s1Core);
  const s1Shards = [];
  const SHAPES_1 = ['line','line','diamond','line','dot','line','diamond','line','line','dot','line','diamond','line','line','dot','line'];
  SHAPES_1.forEach((shape, i) => {
    const s = document.createElement('div');
    s.className = 'shard';
    let css = '';
    if (shape === 'line') {
      const w = Math.max(9 - i * 0.4, 3);
      css = `width:${w}px;height:1.5px;background:linear-gradient(90deg,#fff 0%,#cde 30%,#789 70%,#345 100%);box-shadow:0 0 3px rgba(220,235,255,0.5);border-radius:1px;`;
    } else if (shape === 'diamond') {
      const w = Math.max(4 - i * 0.15, 2);
      css = `width:${w}px;height:${w}px;background:linear-gradient(135deg,#fff,#aab,#345);border-radius:1px;box-shadow:0 0 4px rgba(220,235,255,0.6);`;
    } else {
      const w = Math.max(2 - i * 0.08, 1);
      css = `width:${w}px;height:${w}px;background:#cde;border-radius:50%;box-shadow:0 0 4px #fff;`;
    }
    s.style.cssText = css + `opacity:${(1 - i/SHAPES_1.length) * 0.9};position:fixed;pointer-events:none;`;
    containers[1].append(s);
    s1Shards.push({ el: s, x: mouseX, y: mouseY, shape, wobble: Math.random() * Math.PI * 2 });
  });

  // ═══ STYLE 2 : FILAMENTS ARGENT ═══
  const s2Core = document.createElement('div');
  s2Core.className = 'core';
  s2Core.style.cssText = 'width:6px;height:6px;background:radial-gradient(circle,#fff,#cde);box-shadow:0 0 12px #fff, 0 0 24px rgba(200,220,255,0.5);transform:translate(-50%,-50%);';
  containers[2].append(s2Core);
  const s2Shards = [];
  for (let i = 0; i < 18; i++) {
    const s = document.createElement('div');
    s.className = 'shard';
    const w = Math.max(10 - i * 0.4, 3);
    s.style.cssText = `width:${w}px;height:1px;background:linear-gradient(90deg,#fff 0%,#dee8f0 50%,#8a99ad 100%);box-shadow:0 0 4px rgba(220,235,255,0.7), 0 0 8px rgba(180,210,240,0.3);opacity:${(1 - i/18) * 0.9};border-radius:1px;position:fixed;pointer-events:none;`;
    containers[2].append(s);
    s2Shards.push({ el: s, x: mouseX, y: mouseY, jx: 0, jy: 0 });
  }

  // ═══ STYLE 3 : FILAMENTS DORÉS PREMIUM ═══
  const s3Core = document.createElement('div');
  s3Core.className = 'core';
  s3Core.style.cssText = 'width:6px;height:6px;background:radial-gradient(circle,#FFF8DC,#FFD700);box-shadow:0 0 12px #FFD700, 0 0 24px rgba(255,215,0,0.5), 0 0 4px #fff;transform:translate(-50%,-50%);';
  containers[3].append(s3Core);
  const s3Shards = [];
  for (let i = 0; i < 18; i++) {
    const s = document.createElement('div');
    s.className = 'shard';
    const w = Math.max(10 - i * 0.4, 3);
    s.style.cssText = `width:${w}px;height:1px;background:linear-gradient(90deg,#FFF8DC 0%,#FFD700 50%,#B8860B 100%);box-shadow:0 0 4px #FFD700, 0 0 8px rgba(255,215,0,0.4);opacity:${(1 - i/18) * 0.9};border-radius:1px;position:fixed;pointer-events:none;`;
    containers[3].append(s);
    s3Shards.push({ el: s, x: mouseX, y: mouseY, jx: 0, jy: 0 });
  }

  // ═══ STYLE 4 : FILAMENTS BRAND ORANGE ═══
  const s4Core = document.createElement('div');
  s4Core.className = 'core';
  s4Core.style.cssText = 'width:6px;height:6px;background:radial-gradient(circle,#FFD700,#FF6F00);box-shadow:0 0 14px #FF6F00, 0 0 28px rgba(255,111,0,0.5), 0 0 4px #FFD700;transform:translate(-50%,-50%);';
  containers[4].append(s4Core);
  const s4Shards = [];
  for (let i = 0; i < 18; i++) {
    const s = document.createElement('div');
    s.className = 'shard';
    const w = Math.max(10 - i * 0.4, 3);
    s.style.cssText = `width:${w}px;height:1px;background:linear-gradient(90deg,#FFE4B5 0%,#FF6F00 50%,#8B2500 100%);box-shadow:0 0 4px #FF6F00, 0 0 8px rgba(255,111,0,0.4);opacity:${(1 - i/18) * 0.9};border-radius:1px;position:fixed;pointer-events:none;`;
    containers[4].append(s);
    s4Shards.push({ el: s, x: mouseX, y: mouseY, jx: 0, jy: 0 });
  }

  function setStyle(n) {
    currentStyle = n;
    for (let i = 1; i <= 4; i++) {
      containers[i].style.display = (i === n) ? 'block' : 'none';
    }
    document.getElementById('style-info').innerHTML = 'Style actif : ' + infos[n];
    document.querySelectorAll('.style-btn').forEach(b => {
      b.classList.toggle('active', +b.dataset.style === n);
    });
  }
  setStyle(1);

  document.querySelectorAll('.style-btn').forEach(b => {
    b.addEventListener('click', () => setStyle(+b.dataset.style));
  });

  const lerp = (a,b,n) => a + (b-a)*n;
  let frame = 0;

  function animateFilaments(core, shards) {
    core.style.left = mouseX + 'px';
    core.style.top  = mouseY + 'px';
    core.style.opacity = 0.85 + Math.sin(frame * 0.2) * 0.15;
    let px = mouseX, py = mouseY;
    shards.forEach((s, i) => {
      const t = 0.4 - i * 0.018;
      const disp = Math.sin(i * 0.8 + frame * 0.05) * 3;
      s.jx = lerp(s.jx, Math.cos(perpAngle) * disp, 0.2);
      s.jy = lerp(s.jy, Math.sin(perpAngle) * disp, 0.2);
      s.x = lerp(s.x, px + s.jx, t);
      s.y = lerp(s.y, py + s.jy, t);
      s.el.style.left = s.x + 'px';
      s.el.style.top  = s.y + 'px';
      s.el.style.transform = `translate(-50%,-50%) rotate(${trailAngle}deg)`;
      px = s.x; py = s.y;
    });
  }

  function tick() {
    frame++;
    const dx = mouseX - prevMouseX;
    const dy = mouseY - prevMouseY;
    mouseSpeed = Math.sqrt(dx*dx + dy*dy);
    if (mouseSpeed > 0.5) {
      const target = Math.atan2(dy, dx);
      // smooth angle
      trailAngle = lerp(trailAngle, target * 180 / Math.PI, 0.3);
      perpAngle = target + Math.PI/2;
    }
    prevMouseX = mouseX;
    prevMouseY = mouseY;

    // STYLE 1 : Chrome directionnel
    if (currentStyle === 1) {
      s1Core.style.left = mouseX + 'px';
      s1Core.style.top  = mouseY + 'px';
      const shine = (Math.sin(frame * 0.05) + 1) * 50;
      s1Core.style.background = `linear-gradient(135deg,#fff ${shine}%,#aab ${shine+25}%,#456 100%)`;
      let px = mouseX, py = mouseY;
      s1Shards.forEach((s, i) => {
        const t = 0.36 - i * 0.014;
        s.x = lerp(s.x, px, t);
        s.y = lerp(s.y, py, t);
        s.wobble += 0.08;
        s.el.style.left = s.x + 'px';
        s.el.style.top  = s.y + 'px';
        if (s.shape === 'line') {
          // lignes alignées au mouvement
          s.el.style.transform = `translate(-50%,-50%) rotate(${trailAngle}deg)`;
        } else if (s.shape === 'diamond') {
          // losanges tournent avec un wobble
          s.el.style.transform = `translate(-50%,-50%) rotate(${45 + Math.sin(s.wobble) * 30}deg)`;
        } else {
          s.el.style.transform = `translate(-50%,-50%)`;
        }
        px = s.x; py = s.y;
      });
    }

    // STYLES 2, 3, 4 : Filaments (même comportement, couleur différente)
    else if (currentStyle === 2) animateFilaments(s2Core, s2Shards);
    else if (currentStyle === 3) animateFilaments(s3Core, s3Shards);
    else if (currentStyle === 4) animateFilaments(s4Core, s4Shards);

    requestAnimationFrame(tick);
  }
  tick();
})();
</script>
</body>
</html>
