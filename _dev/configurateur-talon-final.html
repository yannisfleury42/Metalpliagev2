<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Talon embout — itération 4</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#0d0d0d;color:#e8e8e8;font-family:'Inter',sans-serif}
  body{padding:32px;min-height:100vh}
  h1{font-size:22px;font-weight:800;letter-spacing:-.01em;margin-bottom:6px}
  .intro{color:#888;font-size:13px;max-width:880px;line-height:1.6;margin-bottom:28px}
  .intro strong{color:#FF7040}
  .card{background:#141414;border:1px solid #222;border-radius:14px;padding:22px;position:relative}
  .card .badge{position:absolute;top:14px;right:18px;font-size:10px;letter-spacing:0.22em;color:#FF7040;background:rgba(255,128,64,0.08);padding:4px 10px;border-radius:20px;font-weight:700}
  .card h2{font-size:15px;font-weight:700;margin-bottom:4px;color:#fff;letter-spacing:-.01em}
  .stage{background:#1e2630;border:1px solid #1a1a1a;padding:18px;border-radius:10px;display:flex;align-items:center;justify-content:center;min-height:340px}
  .stage svg{display:block;width:100%;height:auto;max-height:360px}
</style>
</head>
<body>

<h1>Talon embout — itération 4 (polish final)</h1>
<p class="intro">
  Action vs zone différenciées par couleur, unité "mm" sur les cotes, langage neutre, mini-vue
  assemblée agrandie et plus lisible.
</p>

<div class="card">
  <span class="badge">ITER 4</span>
  <h2>Final</h2>
  <div class="stage">
    <svg viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="i4-muret" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#a5aeb1"/><stop offset="100%" stop-color="#7a8388"/>
        </linearGradient>
        <linearGradient id="i4-muret-side" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#7a8388"/><stop offset="100%" stop-color="#525a5e"/>
        </linearGradient>
        <linearGradient id="i4-cov" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#5e8aab"/><stop offset="100%" stop-color="#4A7090"/>
        </linearGradient>
        <linearGradient id="i4-cov-dark" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#3a5a78"/><stop offset="100%" stop-color="#2A4858"/>
        </linearGradient>
        <linearGradient id="i4-shine-top" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </linearGradient>
        <linearGradient id="i4-shine-front" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.10)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0.25)"/>
        </linearGradient>
        <linearGradient id="i4-talon" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#7AA8C8"/><stop offset="100%" stop-color="#5E8AAA"/>
        </linearGradient>
        <linearGradient id="i4-talon-dark" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4A7090"/><stop offset="100%" stop-color="#3A5A78"/>
        </linearGradient>
        <radialGradient id="i4-ground-shadow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(0,0,0,0.5)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
        </radialGradient>
        <filter id="i4-drop"><feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/></filter>
      </defs>

      <!-- Ombre portée -->
      <ellipse cx="220" cy="288" rx="220" ry="7" fill="url(#i4-ground-shadow)" opacity="0.7"/>

      <!-- ═══ MURET ═══ -->
      <rect x="40" y="160" width="340" height="120" fill="url(#i4-muret)" stroke="#4a5358" stroke-width="0.5"/>
      <polygon points="380,160 410,130 410,250 380,280" fill="url(#i4-muret-side)"/>
      <line x1="380" y1="160" x2="380" y2="280" stroke="#4a5358" stroke-width="0.5"/>
      <line x1="380" y1="160" x2="410" y2="130" stroke="#3e4448" stroke-width="0.4"/>
      <line x1="40" y1="195" x2="380" y2="195" stroke="#5a6266" stroke-width="0.4"/>
      <line x1="40" y1="235" x2="380" y2="235" stroke="#5a6266" stroke-width="0.4"/>
      <line x1="100" y1="160" x2="100" y2="195" stroke="#5a6266" stroke-width="0.3"/>
      <line x1="200" y1="160" x2="200" y2="195" stroke="#5a6266" stroke-width="0.3"/>
      <line x1="300" y1="160" x2="300" y2="195" stroke="#5a6266" stroke-width="0.3"/>
      <line x1="160" y1="195" x2="160" y2="235" stroke="#5a6266" stroke-width="0.3"/>
      <line x1="260" y1="195" x2="260" y2="235" stroke="#5a6266" stroke-width="0.3"/>
      <line x1="360" y1="195" x2="360" y2="235" stroke="#5a6266" stroke-width="0.3"/>
      <text x="210" y="263" text-anchor="middle" font-size="9.5" font-family="Inter,sans-serif" fill="rgba(255,255,255,0.5)" letter-spacing="0.22em" font-weight="600">SUPPORT</text>

      <!-- ═══ COUVERTINE ═══ -->
      <polygon points="60,150 405,150 435,122 90,122" fill="url(#i4-cov)" filter="url(#i4-drop)"/>
      <polygon points="60,150 405,150 435,122 90,122" fill="url(#i4-shine-top)" pointer-events="none"/>
      <rect x="60" y="150" width="345" height="44" fill="url(#i4-cov-dark)"/>
      <rect x="60" y="150" width="345" height="44" fill="url(#i4-shine-front)" pointer-events="none"/>
      <line x1="60" y1="150" x2="405" y2="150" stroke="rgba(255,255,255,0.55)" stroke-width="1"/>
      <text x="200" y="180" text-anchor="middle" font-size="11" font-family="Inter,sans-serif" fill="rgba(255,255,255,0.92)" letter-spacing="0.18em" font-weight="700">COUVERTINE</text>

      <!-- ═══ CREUX OUVERT — contour CYAN (zone) ═══ -->
      <polygon points="405,150 435,122 435,166 405,194" fill="#0d1218"/>
      <polygon points="405,150 435,122 433,124 408,153 408,191 405,194" fill="url(#i4-cov-dark)" opacity="0.9"/>
      <polygon points="435,166 433,164 408,191 408,164" fill="url(#i4-cov-dark)" opacity="0.5"/>
      <!-- Contour cyan (différencie de l'orange "action") -->
      <line x1="408" y1="153" x2="431" y2="126" stroke="#5BC4E8" stroke-width="0.8" stroke-dasharray="2 2"/>
      <line x1="408" y1="153" x2="408" y2="191" stroke="#5BC4E8" stroke-width="0.8" stroke-dasharray="2 2"/>
      <line x1="408" y1="191" x2="431" y2="164" stroke="#5BC4E8" stroke-width="0.8" stroke-dasharray="2 2"/>

      <!-- Annotation creux neutre (descriptif, pas impératif) -->
      <text x="445" y="218" font-size="9" font-family="Inter,sans-serif" fill="rgba(91,196,232,0.95)" font-weight="700">extrémité ouverte</text>
      <text x="445" y="229" font-size="8" font-family="Inter,sans-serif" fill="rgba(255,255,255,0.6)">de la couvertine</text>

      <!-- ═══ TALON ═══ -->
      <polygon points="500,124 533,124 563,96 530,96" fill="url(#i4-talon)" filter="url(#i4-drop)"/>
      <polygon points="500,124 533,124 563,96 530,96" fill="rgba(255,255,255,0.22)" pointer-events="none"/>
      <rect x="500" y="124" width="33" height="3" fill="url(#i4-talon-dark)"/>
      <rect x="530" y="127" width="3" height="44" fill="url(#i4-talon)"/>
      <polygon points="533,124 563,96 563,140 533,168" fill="url(#i4-talon-dark)"/>

      <!-- Outline L noir -->
      <path d="M 500 124 L 533 124 L 533 171 L 530 171 L 530 127 L 500 127 Z"
            fill="none" stroke="#000" stroke-width="2.5" stroke-linejoin="miter" opacity="0.85"/>

      <!-- ═══ FLÈCHE D'ASSEMBLAGE — ORANGE (action) ═══ -->
      <path d="M 495 150 Q 470 158 440 168" fill="none" stroke="#FF7040" stroke-width="1.2" stroke-dasharray="5 3"/>
      <path d="M 440 168 L 418 174" fill="none" stroke="#FF7040" stroke-width="2.2"/>
      <polygon points="418,174 425,171 425,178" fill="#FF7040"/>

      <!-- ═══ BANNIÈRE ═══ -->
      <rect x="445" y="55" width="145" height="32" rx="4" fill="#FF7040"/>
      <text x="517" y="71" text-anchor="middle" font-size="11" font-family="Inter,sans-serif" fill="#fff" font-weight="800" letter-spacing="0.06em">À AJOUTER EN BOUT</text>
      <text x="517" y="82" text-anchor="middle" font-size="7.5" font-family="Inter,sans-serif" fill="rgba(255,255,255,0.85)" letter-spacing="0.04em">pièce en L (talon embout)</text>

      <!-- ═══ COTES avec "mm" explicite ═══ -->
      <line x1="500" y1="111" x2="500" y2="119" stroke="#FFB347" stroke-width="0.5"/>
      <line x1="533" y1="111" x2="533" y2="119" stroke="#FFB347" stroke-width="0.5"/>
      <line x1="500" y1="115" x2="533" y2="115" stroke="#FFB347" stroke-width="0.5"/>
      <polygon points="506,115 501,112 501,118" fill="#FFB347"/>
      <polygon points="527,115 532,112 532,118" fill="#FFB347"/>
      <text x="516" y="108" text-anchor="middle" font-size="8" font-family="Inter,sans-serif" fill="rgba(255,200,130,0.95)" font-weight="700">30 mm</text>

      <line x1="542" y1="127" x2="550" y2="127" stroke="#FFB347" stroke-width="0.5"/>
      <line x1="542" y1="171" x2="550" y2="171" stroke="#FFB347" stroke-width="0.5"/>
      <line x1="546" y1="127" x2="546" y2="171" stroke="#FFB347" stroke-width="0.5"/>
      <polygon points="546,135 543,128 549,128" fill="#FFB347"/>
      <polygon points="546,163 543,170 549,170" fill="#FFB347"/>
      <text x="553" y="152" font-size="8" font-family="Inter,sans-serif" fill="rgba(255,200,130,0.95)" font-weight="700">60 mm</text>

      <!-- ═══ MINI VUE ASSEMBLÉE — agrandie ═══ -->
      <g transform="translate(425, 243)">
        <rect x="0" y="0" width="170" height="62" rx="5" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.18)" stroke-width="0.6"/>
        <text x="85" y="13" text-anchor="middle" font-size="8" font-family="Inter,sans-serif" fill="rgba(255,255,255,0.65)" letter-spacing="0.18em" font-weight="700">RÉSULTAT APRÈS POSE</text>
        <!-- Mini scène -->
        <rect x="10" y="32" width="120" height="22" fill="url(#i4-muret)" opacity="0.7"/>
        <polygon points="14,26 130,26 138,18 22,18" fill="url(#i4-cov)"/>
        <rect x="14" y="26" width="116" height="6" fill="url(#i4-cov-dark)"/>
        <polygon points="130,26 138,18 138,26" fill="url(#i4-talon-dark)"/>
        <line x1="14" y1="26" x2="130" y2="26" stroke="rgba(255,255,255,0.4)" stroke-width="0.4"/>
        <!-- Check + texte -->
        <circle cx="150" cy="44" r="7" fill="#3FAB6E"/>
        <text x="150" y="48" text-anchor="middle" font-size="9" font-family="Inter,sans-serif" fill="#fff" font-weight="800">✓</text>
        <text x="68" y="47" text-anchor="middle" font-size="7.5" font-family="Inter,sans-serif" fill="rgba(255,255,255,0.75)" font-style="italic">teinte RAL identique partout</text>
      </g>

      <!-- Titre -->
      <text x="300" y="30" text-anchor="middle" font-size="13" font-family="Inter,sans-serif" fill="rgba(255,255,255,0.95)" letter-spacing="0.18em" font-weight="700">TALON EMBOUT</text>
      <text x="300" y="48" text-anchor="middle" font-size="9" font-family="Inter,sans-serif" fill="rgba(255,180,90,0.85)" letter-spacing="0.12em" font-weight="600">pièce en L qui ferme l'extrémité ouverte de la couvertine</text>
    </svg>
  </div>
</div>

</body>
</html>
