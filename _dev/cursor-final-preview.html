<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Curseur final — Chrome directionnel orange</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height:100%;
    background: radial-gradient(ellipse at center, #1a1a1a 0%, #050505 100%);
    color:#eee;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    overflow:hidden;
  }
  @media (pointer: fine) { * { cursor: none !important; } }

  .header {
    position:fixed; top:0; left:0; right:0;
    padding:24px 32px;
    z-index:1000;
    background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%);
  }
  .header h1 {
    font-size:13px; font-weight:600; letter-spacing:3px;
    text-transform:uppercase;
    background: linear-gradient(135deg, #FFD700, #FF6F00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    font-size:11px; letter-spacing:2px;
    color: rgba(255,255,255,0.5);
    margin-top:4px;
    text-transform:uppercase;
  }

  .playground {
    height:100%;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:40px;
    padding:80px 40px 40px;
  }
  .playground h2 {
    font-size:48px; font-weight:300; letter-spacing:4px;
    text-align:center; color:#fff;
    text-shadow: 0 0 40px rgba(255,111,0,0.4);
  }
  .label {
    font-size:12px; letter-spacing:5px;
    color:rgba(255,111,0,0.7);
    text-transform:uppercase;
  }
  .test-zone {
    display:flex; gap:20px; flex-wrap:wrap; justify-content:center;
  }
  .test-card {
    width:220px; height:150px;
    background: linear-gradient(135deg, rgba(255,111,0,0.08), rgba(255,255,255,0.02));
    border:1px solid rgba(255,111,0,0.15);
    border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    font-size:14px;
    transition: all 0.3s;
  }
  .test-card:hover {
    border-color: rgba(255,111,0,0.6);
    transform: translateY(-6px);
    box-shadow: 0 12px 50px rgba(255,111,0,0.2);
  }

  .shard {
    position:fixed;
    pointer-events:none;
    z-index:99998;
    will-change: transform, opacity, left, top;
  }
  .core {
    position:fixed;
    pointer-events:none;
    z-index:99999;
    transform: translate(-50%,-50%);
    border-radius:50%;
  }

  .footer {
    position:fixed;
    bottom:24px; left:50%;
    transform: translateX(-50%);
    padding: 14px 28px;
    background: rgba(0,0,0,0.75);
    border:1px solid rgba(255,111,0,0.4);
    border-radius:30px;
    font-size:13px;
    backdrop-filter: blur(10px);
    text-align:center;
  }
  .footer strong { color:#FF6F00; }
</style>
</head>
<body>
  <div class="header">
    <h1>◆ Chrome directionnel — Édition Orange</h1>
    <p>Mix de formes · Lignes alignées au mouvement · Charte Métal Pliage</p>
  </div>

  <div class="playground">
    <span class="label">— BOUGE LA SOURIS · SURVOLE LES CARTES —</span>
    <h2>Métal Pliage</h2>
    <div class="test-zone">
      <div class="test-card">Survole-moi</div>
      <div class="test-card">Élément interactif</div>
      <div class="test-card">Test hover</div>
    </div>
  </div>

  <div class="footer">
    <strong>Si tu valides</strong> — je l'intègre dans le site à la place du curseur actuel
  </div>

<script>
(function(){
  let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;
  let prevMouseX = mouseX, prevMouseY = mouseY;
  let mouseSpeed = 0;
  let trailAngle = 0;

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  // ═══ CORE — bille incandescente orange ═══
  const core = document.createElement('div');
  core.className = 'core';
  core.style.cssText = 'width:8px;height:8px;background:radial-gradient(circle at 30% 30%, #FFF8DC, #FFD700 40%, #FF6F00 100%);box-shadow:0 0 12px #FF6F00, 0 0 24px rgba(255,111,0,0.5), 0 0 4px #FFD700;';
  document.body.append(core);

  // ═══ SHARDS — mix de formes en couleurs orange ═══
  const shards = [];
  const SHAPES = ['line','line','diamond','line','dot','line','diamond','line','line','dot','line','diamond','line','line','dot','line'];

  SHAPES.forEach((shape, i) => {
    const s = document.createElement('div');
    s.className = 'shard';
    let css = '';
    if (shape === 'line') {
      const w = Math.max(9 - i * 0.4, 3);
      css = `width:${w}px;height:1.5px;background:linear-gradient(90deg,#FFF8DC 0%,#FFD700 25%,#FF6F00 65%,#4A1500 100%);box-shadow:0 0 4px rgba(255,180,80,0.6);border-radius:1px;`;
    } else if (shape === 'diamond') {
      const w = Math.max(4 - i * 0.15, 2);
      css = `width:${w}px;height:${w}px;background:linear-gradient(135deg,#FFEC8B,#FF6F00,#4A1500);border-radius:1px;box-shadow:0 0 5px rgba(255,140,40,0.7);`;
    } else {
      const w = Math.max(2 - i * 0.08, 1);
      css = `width:${w}px;height:${w}px;background:#FFE4B5;border-radius:50%;box-shadow:0 0 5px #FFD700;`;
    }
    s.style.cssText = css + `opacity:${(1 - i/SHAPES.length) * 0.92};position:fixed;pointer-events:none;`;
    document.body.append(s);
    shards.push({ el: s, x: mouseX, y: mouseY, shape, wobble: Math.random() * Math.PI * 2 });
  });

  // hover state
  let isHover = false;
  document.querySelectorAll('button, .test-card, a').forEach(el => {
    el.addEventListener('mouseenter', () => isHover = true);
    el.addEventListener('mouseleave', () => isHover = false);
  });

  const lerp = (a,b,n) => a + (b-a)*n;
  let frame = 0;

  function tick() {
    frame++;
    const dx = mouseX - prevMouseX;
    const dy = mouseY - prevMouseY;
    mouseSpeed = Math.sqrt(dx*dx + dy*dy);
    if (mouseSpeed > 0.5) {
      const target = Math.atan2(dy, dx);
      trailAngle = lerp(trailAngle, target * 180 / Math.PI, 0.3);
    }
    prevMouseX = mouseX;
    prevMouseY = mouseY;

    core.style.left = mouseX + 'px';
    core.style.top  = mouseY + 'px';
    // pulsation subtile incandescente
    const pulse = 0.85 + Math.sin(frame * 0.1) * 0.15;
    core.style.opacity = pulse;
    core.style.transform = `translate(-50%,-50%) scale(${isHover ? 1.4 : 1})`;
    core.style.transition = 'transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1)';

    let px = mouseX, py = mouseY;
    shards.forEach((s, i) => {
      const t = 0.36 - i * 0.014;
      s.x = lerp(s.x, px, t);
      s.y = lerp(s.y, py, t);
      s.wobble += 0.08;
      s.el.style.left = s.x + 'px';
      s.el.style.top  = s.y + 'px';
      if (s.shape === 'line') {
        s.el.style.transform = `translate(-50%,-50%) rotate(${trailAngle}deg)`;
      } else if (s.shape === 'diamond') {
        s.el.style.transform = `translate(-50%,-50%) rotate(${45 + Math.sin(s.wobble) * 30}deg)`;
      } else {
        s.el.style.transform = `translate(-50%,-50%)`;
      }
      // léger boost de luminosité au hover
      if (isHover) {
        s.el.style.filter = 'brightness(1.3) saturate(1.2)';
      } else {
        s.el.style.filter = '';
      }
      px = s.x; py = s.y;
    });

    requestAnimationFrame(tick);
  }
  tick();
})();
</script>
</body>
</html>
